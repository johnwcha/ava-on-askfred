<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ava | WCU Associate Virtual Assistant</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: rgb(0, 83, 94);
        color: #ffffff;
      }

      .appbar {
        height: 80px;
        padding: 0 32px;
        background: #ffffff;
        display: flex;
        align-items: center;
        box-shadow: 0 1px 0 rgb(0 0 0 / 0.08);
      }

      .logo {
        display: block;
        width: min(260px, 64vw);
        height: auto;
      }

      main {
        min-height: calc(100vh - 80px);
        background: rgb(0, 83, 94);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        padding: 48px 24px 120px;
        text-align: center;
      }

      .avatar {
        width: clamp(160px, 26vw, 260px);
        aspect-ratio: 1;
        border-radius: 50%;
        object-fit: cover;
        object-position: center 24%;
        border: 6px solid #ffffff;
        box-shadow: 0 18px 40px rgb(0 0 0 / 0.24);
      }

      h1 {
        max-width: 900px;
        margin: 0;
        font-weight: 750;
      }

      .headline-primary,
      .headline-secondary {
        display: block;
      }

      .headline-primary {
        font-size: clamp(3.5rem, 10vw, 8rem);
        line-height: 0.95;
        font-weight: 800;
      }

      .headline-secondary {
        margin-top: 12px;
        font-size: clamp(2rem, 4.5vw, 4rem);
        line-height: 1.08;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <header class="appbar">
      <img class="logo" src="wcu-torch-logo-teal.svg" alt="West Coast University">
    </header>

    <main>
      <img class="avatar" src="ava_ai_avatar.png" alt="Ava">
      <h1>
        <span class="headline-primary">AVA</span>
        <span class="headline-secondary">Associate Virtual Assistant</span>
      </h1>
    </main>

    <script src="https://platform.collegevine.com/trellis/webchat/embed/6c8edd03-7ae0-4dc1-8e08-04a6a3935ab0.js"></script>
  </body>
</html>

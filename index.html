<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ava | WCU Academic Virtual Assistant</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: rgb(0, 83, 94);
        color: #ffffff;
      }

      .appbar {
        height: 80px;
        padding: 0 32px;
        background: #ffffff;
        display: flex;
        align-items: center;
        box-shadow: 0 1px 0 rgb(0 0 0 / 0.08);
      }

      .logo {
        display: block;
        width: min(260px, 64vw);
        height: auto;
      }

      main {
        min-height: calc(100vh - 80px);
        background: rgb(0, 83, 94);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
        text-align: center;
      }

      h1 {
        max-width: 900px;
        margin: 0;
        font-size: clamp(2.5rem, 6vw, 5rem);
        line-height: 1.05;
        font-weight: 750;
      }
    </style>
  </head>
  <body>
    <header class="appbar">
      <img class="logo" src="wcu-torch-logo-teal.svg" alt="West Coast University">
    </header>

    <main>
      <h1>Ava is WCU's academic virtual assistant</h1>
    </main>

    <script src="https://platform.collegevine.com/trellis/webchat/embed/6c8edd03-7ae0-4dc1-8e08-04a6a3935ab0.js"></script>
  </body>
</html>
